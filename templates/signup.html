{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="hero-orbits" aria-hidden="true" style="position:fixed">
    <span class="glow g1"></span>
    <span class="glow g2"></span>
  </div>

  <div class="auth-card apple-reveal">
    <div class="auth-logo">
      <span class="logo-icon" style="width:40px;height:40px;border-radius:12px;font-size:18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,var(--sage-soft),var(--sage-deep));color:#fff;font-weight:700">Y</span>
    </div>
    <h2 class="serif">Join <em>YSP Learns.</em></h2>
    <p class="auth-sub">Create your student account to start learning</p>

    <form method="POST" action="{{ url_for('signup') }}" data-validate>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-input" placeholder="Your full name" value="{{ full_name or '' }}" required minlength="2">
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" value="{{ email or '' }}" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="Re-enter your password" required autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-forest btn-lg w-full" style="justify-content:center" data-magnetic>
        Create Account <span class="arr">↗</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
    </div>
  </div>
</div>
{% endblock %}
