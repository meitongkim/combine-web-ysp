{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="hero-orbits" aria-hidden="true" style="position:fixed">
    <span class="glow g1"></span>
    <span class="glow g2"></span>
  </div>

  <div class="auth-card apple-reveal">
    <div class="auth-logo">
      <span class="logo-icon" style="width:40px;height:40px;border-radius:12px;font-size:18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,var(--sage-soft),var(--sage-deep));color:#fff;font-weight:700">Y</span>
    </div>
    <h2 class="serif">Welcome <em>back.</em></h2>
    <p class="auth-sub">Sign in to your YSP Learns account</p>

    <form method="POST" action="{{ url_for('login') }}" data-validate>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:8px">
        <input type="checkbox" name="remember" id="remember" style="accent-color:var(--sage-deep)">
        <label for="remember" style="font-size:13px; color:var(--ink-soft); cursor:pointer">Remember me</label>
      </div>

      <button type="submit" class="btn btn-forest btn-lg w-full" style="justify-content:center" data-magnetic>
        Sign In <span class="arr">↗</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('signup') }}">Create one here</a>
    </div>
  </div>
</div>
{% endblock %}
